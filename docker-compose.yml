version: '3.8'

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: defab_backend
    ports: ["3000:3000"]
    volumes: [".:/app"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
      migrate: { condition: service_completed_successfully } # Waits for SQL!
    environment:
      - DB_HOST=db
      - DB_USER=defab_user
      - DB_PASS=defab_pass
      - DB_NAME=defab_db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  migrate:
    image: migrate/migrate
    volumes: ["./migrations:/migrations"]
    command: ["-path=/migrations", "-database=postgres://defab_user:defab_pass@db:5432/defab_db?sslmode=disable", "up"]
    depends_on:
      db: { condition: service_healthy }

  db:
    image: postgres:16-alpine
    container_name: defab_db
    restart: always
    environment:
      POSTGRES_USER: defab_user
      POSTGRES_PASSWORD: defab_pass
      POSTGRES_DB: defab_db
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defab_user -d defab_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes: ["postgres_data:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    container_name: defab_redis
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]

volumes: { postgres_data: , redis_data: }