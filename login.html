<!DOCTYPE html>
<html>
<head><title>Google Sign-In Test</title></head>
<body>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <div id="g_id_onload"
       data-client_id="729564267641-7lp8d4a38ib6r7am9vpmu3stdepflna8.apps.googleusercontent.com"
       data-callback="handleToken">
  </div>
  <div class="g_id_signin" data-type="standard"></div>
  <script>
    function handleToken(response) {
      document.getElementById('token').innerText = response.credential;
    }
  </script>
  <h3>ID Token:</h3>
  <textarea id="token" rows="10" cols="80"></textarea>
</body>
</html>
